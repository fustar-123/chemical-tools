<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>管式反应器计算</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
  <header class="site-header"><div class="site-header-inner"><div class="brand"><h1>管式反应器计算</h1><p>按简化设计方程估算 PFR 反应器体积和停留时间。</p></div><div class="header-actions"><a class="btn ghost" href="../">返回首页</a></div></div></header>
  <main class="page-shell"><div id="toolRoot"></div></main>
  <script>
    window.toolConfig = {
      fields: [
        { id: "fa0", label: "进料 A 摩尔流量 kmol/h", value: 10, min: 0 },
        { id: "conversion", label: "目标转化率 %", value: 80, min: 0 },
        { id: "rate", label: "平均反应速率 kmol/(m³·h)", value: 5, min: 0.0001 },
        { id: "volFlow", label: "体积流量 m³/h", value: 12, min: 0.0001 },
        { id: "margin", label: "体积裕量 %", value: 10, min: 0 }
      ],
      calculate(v, h) {
        const x = v.conversion / 100;
        const volume = v.fa0 * x / v.rate;
        const rec = volume * (1 + v.margin / 100);
        const tau = rec / v.volFlow;
        return {
          results: [
            { label: "反应器有效体积", value: volume, unit: "m³" },
            { label: "建议设计体积", value: rec, unit: "m³" },
            { label: "设计停留时间", value: tau, unit: "h" },
            { label: "设计停留时间", value: tau * 60, unit: "min" }
          ],
          formula: `V = F_A0·X / (-r_A) = ${h.fmt(volume)} m³`,
          warnings: [x > 0.95 ? "转化率很高时，平均速率法可能低估所需体积。" : ""].filter(Boolean),
          notes: ["这是按平均反应速率的初算形式；正式 PFR 设计应积分 V = ∫F_A0/(-rA)dX。"]
        };
      }
    };
  </script>
  <script src="../js/calculator.js"></script>
</body>
</html>
