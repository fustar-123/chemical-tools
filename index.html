<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>化工计算工具箱</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">
        <h1>化工计算工具箱</h1>
        <p>用于常用化工设计计算，支持手机和电脑浏览器使用。</p>
      </div>
      <div class="header-actions">
        <a class="btn ghost" href="pump/">泵扬程计算器</a>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <h2 class="section-title">计算模块</h2>
    <div class="category-grid">
      <section class="category">
        <h2>流体输送</h2>
        <div class="tool-list">
          <a class="tool-card available" href="pump/"><span class="tool-name">泵扬程计算器</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="pressure-drop/"><span class="tool-name">管道压降</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="pipe-diameter/"><span class="tool-name">管径计算</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="reynolds/"><span class="tool-name">雷诺数</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="npsh/"><span class="tool-name">NPSH</span><span class="tool-status">可使用</span></a>
        </div>
      </section>

      <section class="category">
        <h2>换热设备</h2>
        <div class="tool-list">
          <a class="tool-card available" href="heat-area/"><span class="tool-name">换热面积</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="lmtd/"><span class="tool-name">LMTD</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="heat-exchanger-pressure-drop/"><span class="tool-name">换热器压降</span><span class="tool-status">可使用</span></a>
        </div>
      </section>

      <section class="category">
        <h2>反应器</h2>
        <div class="tool-list">
          <a class="tool-card available" href="pfr/"><span class="tool-name">管式反应器</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="residence-time/"><span class="tool-name">停留时间</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="holdup/"><span class="tool-name">持液量</span><span class="tool-status">可使用</span></a>
        </div>
      </section>

      <section class="category">
        <h2>储运设备</h2>
        <div class="tool-list">
          <a class="tool-card available" href="tank-volume/"><span class="tool-name">储罐容积</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="nitrogen-blanketing/"><span class="tool-name">氮封</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="breather-valve/"><span class="tool-name">呼吸阀</span><span class="tool-status">可使用</span></a>
          <a class="tool-card available" href="safety-valve/"><span class="tool-name">安全阀</span><span class="tool-status">可使用</span></a>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <span>chemical-tools</span> · <span data-current-year></span>
  </footer>

  <script src="js/common.js"></script>
</body>
</html>
